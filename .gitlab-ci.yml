stages:
  - test
  - deploy_staging

image: docker:latest

services:
  - docker:dind

before_script:
  ## Add pnpm, nodejs and npm for linting test, etc
  - apk --update add nodejs npm
  - npm i -g pnpm
  - pnpm install --frozen-lockfile

test_feature_branches:
  stage: test
  script:
    - pnpm lint
  when: always
  #   - pnpm test-ci
  # artifacts:
  #   when: always
  #   reports:
  #     junit:
  #       - ./coverage/junit.xml

deploy_staging:
  stage: deploy_staging
  before_script:
    ##
    ## Install ssh-agent if not already installed, it is required by Docker.
    ## (change apt-get to yum if you use an RPM-based image)
    ##
    - 'command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
    - apk update && apk add make

    ##
    ## Run ssh-agent (inside the build environment)
    ##
    - eval $(ssh-agent -s)

    ##
    ## Add the SSH key stored in SSH_PRIVATE_KEY variable to the agent store
    ## We're using tr to fix line endings which makes ed25519 keys work
    ## without extra base64 encoding.
    ## https://gitlab.com/gitlab-examples/ssh-private-key/issues/1#note_48526556
    ##
    - echo "$SSH_PRIVATE_KEY"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -

    ##
    ## Create the SSH directory and give it the right permissions
    ##
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

    ##
    ## Check identity of server to avoid Man-in-the-middle
    ##
    - ssh-keyscan 46.226.106.181 >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - docker login registry.gitlab.com -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    # Set env file
    - touch .env
    - cat .env
  only:
    - dev
  script:
    - make build-staging
    - make push-staging
    - scp -r ./docker/staging ubuntu@46.226.106.181:/home/enverse/clients/aldente/digital-odyssey/docker
    - scp ./Makefile ubuntu@46.226.106.181:/home/enverse/clients/aldente/digital-odyssey
    - ssh ubuntu@46.226.106.181 "
      docker login registry.gitlab.com -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD &&
      cd /home/enverse/clients/aldente/digital-odyssey &&
      make pull-staging && make start-staging
      "
